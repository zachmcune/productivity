<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes & To-Do — Productivity Hub</title>
  <script src="shared/transition-preload.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="transitions.css">
  <style>
    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .todo-input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .todo-input-row input {
      flex: 1;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      transition: opacity 0.15s;
    }

    .todo-item.done {
      opacity: 0.5;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
    }

    .todo-item input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: var(--success);
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      word-break: break-word;
    }

    .todo-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      line-height: 1;
      transition: color 0.15s;
    }

    .todo-delete:hover {
      color: var(--danger);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 1.5rem;
      font-size: 0.9rem;
    }

    .notes-panel {
      margin-top: 2rem;
    }

    .notes-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
    }

    .char-count {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="page-title">Notes & To-Do</h1>
    <p class="page-subtitle">Capture thoughts and track what needs doing. Saved automatically — in the cloud when signed in.</p>

    <div class="panel">
      <div class="section-label">To-Do List</div>
      <div class="todo-input-row">
        <input type="text" id="todoInput" placeholder="Add a task…" maxlength="200">
        <button class="btn btn-primary" id="addTodo">Add</button>
      </div>
      <ul class="todo-list" id="todoList"></ul>
      <div class="empty-state" id="todoEmpty">No tasks yet — add one above.</div>
    </div>

    <div class="panel notes-panel">
      <div class="section-label">Quick Notes</div>
      <textarea id="notesArea" placeholder="Jot down ideas, reminders, or anything on your mind…"></textarea>
      <div class="notes-footer">
        <span class="char-count" id="charCount">0 characters</span>
        <button class="btn btn-secondary" id="clearNotes">Clear notes</button>
      </div>
    </div>
  </main>

  <script src="shared/auth.js"></script>
  <script src="shared/hub-storage.js"></script>
  <script>
    const TODO_KEY = 'hub-todos';
    const NOTES_KEY = 'hub-notes';

    const todoInput = document.getElementById('todoInput');
    const todoList = document.getElementById('todoList');
    const todoEmpty = document.getElementById('todoEmpty');
    const notesArea = document.getElementById('notesArea');
    const charCount = document.getElementById('charCount');

    let todos = [];

    async function saveTodos() {
      await HubStorage.set(TODO_KEY, JSON.stringify(todos));
    }

    function renderTodos() {
      todoList.innerHTML = '';
      todoEmpty.style.display = todos.length ? 'none' : 'block';

      todos.forEach((todo, index) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');
        li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} data-index="${index}">
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="todo-delete" data-index="${index}" aria-label="Delete task">×</button>
        `;
        todoList.appendChild(li);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      todoInput.value = '';
      await saveTodos();
      renderTodos();
    }

    document.getElementById('addTodo').addEventListener('click', () => { addTodo(); });
    todoInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    todoList.addEventListener('click', async (e) => {
      const index = e.target.dataset.index;
      if (index === undefined) return;

      if (e.target.type === 'checkbox') {
        todos[index].done = e.target.checked;
        await saveTodos();
        renderTodos();
      } else if (e.target.classList.contains('todo-delete')) {
        todos.splice(index, 1);
        await saveTodos();
        renderTodos();
      }
    });

    let notesSaveTimer;
    notesArea.addEventListener('input', () => {
      charCount.textContent = `${notesArea.value.length} characters`;
      clearTimeout(notesSaveTimer);
      notesSaveTimer = setTimeout(() => {
        HubStorage.set(NOTES_KEY, notesArea.value);
      }, 400);
    });

    document.getElementById('clearNotes').addEventListener('click', async () => {
      if (notesArea.value && !confirm('Clear all notes?')) return;
      notesArea.value = '';
      await HubStorage.set(NOTES_KEY, '');
      charCount.textContent = '0 characters';
    });

    (async () => {
      await HubStorage.init();
      todos = JSON.parse(await HubStorage.get(TODO_KEY, '[]'));
      notesArea.value = await HubStorage.get(NOTES_KEY, '');
      charCount.textContent = `${notesArea.value.length} characters`;
      renderTodos();
    })();
  </script>
  <script src="shared/layout.js"></script>
  <script>
    SiteLayout.injectNav();
    HubAuth.bindNav();
  </script>
  <script src="transitions.js"></script>
</body>
</html>

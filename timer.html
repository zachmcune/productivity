<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer & Stopwatch — Productivity Hub</title>
  <script src="shared/transition-preload.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="transitions.css">
  <style>
    .time-display {
      font-size: 4rem;
      font-weight: 300;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      margin: 1.5rem 0;
      color: var(--text);
    }

    .time-display.done {
      color: var(--success);
      animation: pulse 1s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .timer-inputs {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .timer-input-group {
      text-align: center;
    }

    .timer-input-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.35rem;
    }

    .timer-input-group input {
      width: 4.5rem;
      text-align: center;
      font-size: 1.25rem;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .controls .btn {
      min-width: 6rem;
      padding: 0.85rem 1.5rem;
    }

    .presets {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .preset-btn {
      padding: 0.4rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .preset-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .lap-list {
      list-style: none;
      margin-top: 1.5rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .lap-item span:last-child {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="page-title">Timer & Stopwatch</h1>
    <p class="page-subtitle">Count down for focus sessions or count up to track time.</p>

    <div class="tabs">
      <button class="tab active" data-tab="timer">Timer</button>
      <button class="tab" data-tab="stopwatch">Stopwatch</button>
    </div>

    <div class="panel">
      <!-- Timer -->
      <div class="tab-content active" id="timer-panel">
        <div class="time-display" id="timerDisplay">05:00</div>
        <div class="timer-inputs" id="timerInputs">
          <div class="timer-input-group">
            <label>Min</label>
            <input type="number" id="timerMin" value="5" min="0" max="99">
          </div>
          <div class="timer-input-group">
            <label>Sec</label>
            <input type="number" id="timerSec" value="0" min="0" max="59">
          </div>
        </div>
        <div class="controls">
          <button class="btn btn-primary" id="timerStart">Start</button>
          <button class="btn btn-secondary" id="timerReset">Reset</button>
        </div>
        <div class="presets">
          <button class="preset-btn" data-min="5">5 min</button>
          <button class="preset-btn" data-min="10">10 min</button>
          <button class="preset-btn" data-min="15">15 min</button>
          <button class="preset-btn" data-min="25">25 min</button>
          <button class="preset-btn" data-min="30">30 min</button>
        </div>
      </div>

      <!-- Stopwatch -->
      <div class="tab-content" id="stopwatch-panel">
        <div class="time-display" id="swDisplay">00:00.00</div>
        <div class="controls">
          <button class="btn btn-primary" id="swStart">Start</button>
          <button class="btn btn-secondary" id="swLap">Lap</button>
          <button class="btn btn-secondary" id="swReset">Reset</button>
        </div>
        <ul class="lap-list" id="lapList"></ul>
      </div>
    </div>
  </main>

  <script>
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-panel').classList.add('active');
      });
    });

    // Timer
    const timerDisplay = document.getElementById('timerDisplay');
    const timerMin = document.getElementById('timerMin');
    const timerSec = document.getElementById('timerSec');
    const timerInputs = document.getElementById('timerInputs');
    let timerTotal = 300;
    let timerRemaining = 300;
    let timerInterval = null;
    let timerRunning = false;

    function formatTimer(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
      timerDisplay.textContent = formatTimer(timerRemaining);
      timerDisplay.classList.toggle('done', timerRemaining === 0 && !timerRunning);
    }

    function setTimerFromInputs() {
      timerTotal = (parseInt(timerMin.value) || 0) * 60 + (parseInt(timerSec.value) || 0);
      timerRemaining = timerTotal;
      updateTimerDisplay();
    }

    document.getElementById('timerStart').addEventListener('click', () => {
      if (timerRunning) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('timerStart').textContent = 'Resume';
        timerInputs.style.display = 'flex';
        return;
      }

      if (timerRemaining === 0) setTimerFromInputs();
      if (timerRemaining === 0) return;

      timerRunning = true;
      timerInputs.style.display = 'none';
      document.getElementById('timerStart').textContent = 'Pause';

      timerInterval = setInterval(() => {
        timerRemaining--;
        updateTimerDisplay();
        if (timerRemaining <= 0) {
          clearInterval(timerInterval);
          timerRunning = false;
          document.getElementById('timerStart').textContent = 'Start';
          timerInputs.style.display = 'flex';
        }
      }, 1000);
    });

    document.getElementById('timerReset').addEventListener('click', () => {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerStart').textContent = 'Start';
      timerInputs.style.display = 'flex';
      setTimerFromInputs();
      timerDisplay.classList.remove('done');
    });

    timerMin.addEventListener('change', () => { if (!timerRunning) setTimerFromInputs(); });
    timerSec.addEventListener('change', () => { if (!timerRunning) setTimerFromInputs(); });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (timerRunning) return;
        timerMin.value = btn.dataset.min;
        timerSec.value = 0;
        setTimerFromInputs();
      });
    });

    // Stopwatch
    const swDisplay = document.getElementById('swDisplay');
    const lapList = document.getElementById('lapList');
    let swElapsed = 0;
    let swInterval = null;
    let swRunning = false;
    let swStartTime = 0;
    let lapCount = 0;

    function formatStopwatch(ms) {
      const mins = Math.floor(ms / 60000);
      const secs = Math.floor((ms % 60000) / 1000);
      const cs = Math.floor((ms % 1000) / 10);
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
    }

    document.getElementById('swStart').addEventListener('click', () => {
      if (swRunning) {
        clearInterval(swInterval);
        swRunning = false;
        document.getElementById('swStart').textContent = 'Resume';
        return;
      }

      swRunning = true;
      swStartTime = Date.now() - swElapsed;
      document.getElementById('swStart').textContent = 'Pause';

      swInterval = setInterval(() => {
        swElapsed = Date.now() - swStartTime;
        swDisplay.textContent = formatStopwatch(swElapsed);
      }, 10);
    });

    document.getElementById('swLap').addEventListener('click', () => {
      if (!swElapsed) return;
      lapCount++;
      const li = document.createElement('li');
      li.className = 'lap-item';
      li.innerHTML = `<span>Lap ${lapCount}</span><span>${formatStopwatch(swElapsed)}</span>`;
      lapList.prepend(li);
    });

    document.getElementById('swReset').addEventListener('click', () => {
      clearInterval(swInterval);
      swRunning = false;
      swElapsed = 0;
      lapCount = 0;
      swDisplay.textContent = '00:00.00';
      lapList.innerHTML = '';
      document.getElementById('swStart').textContent = 'Start';
    });
  </script>
  <script src="shared/layout.js"></script>
  <script>SiteLayout.injectNav();</script>
  <script src="transitions.js"></script>
</body>
</html>
